function lighten(hex, amt) {
  const c = (hex || "#CB9A3E").replace("#", "");
  const num = parseInt(c, 16);
  let r = (num >> 16) + amt, g = ((num >> 8) & 0xff) + amt, b = (num & 0xff) + amt;
  r = Math.min(255, Math.max(0, r)); g = Math.min(255, Math.max(0, g)); b = Math.min(255, Math.max(0, b));
  return `#${(1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1)}`;
}

function themedName(item, theme) {
  const names = THEME_GEAR_NAMES[theme.key];
  return (names && names[item.id]) || item.name;
}
function Sprite({ name, tint, size = 2 }) {
  const grid = SPRITES[name];
  if (!grid) return null;
  const palette = { ...BASE_PALETTE };
  if (tint) { palette.T = tint; palette.L = lighten(tint, 60); }
  const cols = grid[0].length, rows = grid.length;
  return (
    <svg width={cols * size} height={rows * size} viewBox={`0 0 ${cols} ${rows}`} shapeRendering="crispEdges" style={{ display: "block" }}>
      {grid.map((row, y) => row.split("").map((ch, x) => {
        if (ch === "." || !palette[ch]) return null;
        return <rect key={x + "-" + y} x={x} y={y} width={1} height={1} fill={palette[ch]} />;
      }))}
    </svg>
  );
}

// ---------------- Utility ----------------
const uid = () => Math.random().toString(36).slice(2, 9);
const todayStr = () => new Date().toDateString();
const xpToLevel = (xp) => Math.floor(xp / 100) + 1;
const xpInLevel = (xp) => xp % 100;

function mondayKey(d) {
  const date = new Date(d);
  const day = date.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  date.setDate(date.getDate() + diff);
  return date.toISOString().slice(0, 10);
}

function pickTheme(excludeKey) {
  const options = THEMES.filter(t => t.key !== excludeKey);
  const pool = options.length ? options : THEMES;
  return pool[Math.floor(Math.random() * pool.length)];
}

function rollRarity(bonus = false) {
  const roll = Math.random() * 100; let acc = 0, idx = 0;
  for (let i = 0; i < RARITY.length; i++) { acc += RARITY[i].weight; if (roll <= acc) { idx = i; break; } }
  if (bonus) idx = Math.min(idx + 1, RARITY.length - 1);
  const r = RARITY[idx];
  const shards = Math.floor(r.shards[0] + Math.random() * (r.shards[1] - r.shards[0]));
  return { rarity: r.key, color: r.color, shards };
}

function drawDailyQuests(pool, stats) {
  const catXp = Object.fromEntries(Object.keys(STATS).map(k => [k, stats[k]?.xp ?? 0]));
  const maxXp = Math.max(...Object.values(catXp), 1);
  let bag = pool.map(q => ({ q, w: (maxXp - catXp[q.cat] + 20) }));
  const chosen = [];
  for (let i = 0; i < 3 && bag.length; i++) {
    const total = bag.reduce((s, x) => s + x.w, 0);
    let r = Math.random() * total, pick = 0;
    for (; pick < bag.length; pick++) { r -= bag[pick].w; if (r <= 0) break; }
    pick = Math.min(pick, bag.length - 1);
    chosen.push({ ...bag[pick].q, uid: uid(), stage: "new" });
    bag.splice(pick, 1);
  }
  return chosen;
}

function nextBoss(prevMaxHp, floor, namesPool) {
  const name = namesPool[(floor - 1) % namesPool.length];
  const maxHp = Math.round(prevMaxHp * 0.7) + 40;
  return { name, hp: maxHp, maxHp, floor };
}

// ---------------- equipment + combat math helpers ----------------
function equippedLoadoutDefs(state) {
  const ids = [state.loadout.weapon, state.loadout.helmet, state.loadout.chest, state.loadout.legs, state.loadout.acc1, state.loadout.acc2].filter(Boolean);
  return ids.map(id => findPoolItem(id, state)).filter(Boolean);
}
function computeXpMult(state, cat) {
  let mult = 1;
  equippedLoadoutDefs(state).forEach(item => { if (item.effect && item.effect.xpMultAll) mult *= item.effect.xpMultAll; });
  return mult;
}
function computeShardMult(state) {
  let mult = 1;
  equippedLoadoutDefs(state).forEach(item => { if (item.effect && item.effect.shardMult) mult *= item.effect.shardMult; });
  return mult;
}
function hasLootBoost(state) {
  return equippedLoadoutDefs(state).some(i => i.effect && i.effect.lootBoost);
}
function forkChanceMult(state) {
  let mult = 1;
  equippedLoadoutDefs(state).forEach(i => { if (i.effect && i.effect.forkMult) mult *= i.effect.forkMult; });
  return mult;
}
function bossDmgMult(state) {
  let mult = 1;
  equippedLoadoutDefs(state).forEach(i => { if (i.effect && i.effect.bossDmgMult) mult *= i.effect.bossDmgMult; });
  return mult;
}
function hasNoCurse(state) { return equippedLoadoutDefs(state).some(i => i.effect && i.effect.noCurse); }
function vaultDiscountMult(state) { const item = equippedLoadoutDefs(state).find(i => i.effect && i.effect.vaultDiscount); return item ? item.effect.vaultDiscount : 1; }
function momentumBonus(state) { const item = equippedLoadoutDefs(state).find(i => i.effect && i.effect.momentum); return item ? item.effect.momentum : 0; }
function doubleBossChance(state) { const item = equippedLoadoutDefs(state).find(i => i.effect && i.effect.doubleBossChance); return item ? item.effect.doubleBossChance : 0; }
function stretchBossMult(state) { const item = equippedLoadoutDefs(state).find(i => i.effect && i.effect.stretchBossMult); return item ? item.effect.stretchBossMult : 1; }

function charLevelOf(state) {
  return Math.floor(Object.values(state.stats).reduce((a, s) => a + xpToLevel(s.xp), 0) / Object.keys(STATS).length);
}
function computeAttack(state) {
  let atk = 4 + xpToLevel(state.stats.body.xp) * 2;
  equippedLoadoutDefs(state).forEach(i => { if (i.atk) atk += i.atk; });
  return atk;
}
function computeDefense(state) {
  let def = 4 + xpToLevel(state.stats.order.xp) * 2;
  equippedLoadoutDefs(state).forEach(i => { if (i.def) def += i.def; });
  return def;
}
function computeMaxHealth(state) {
  let hp = 60 + charLevelOf(state) * 8;
  equippedLoadoutDefs(state).forEach(i => { if (i.health) hp += i.health; });
  return hp;
}
function clamp(n, lo, hi) { return Math.max(lo, Math.min(hi, n)); }

function checkAchievements(s) {
  const newly = [];
  ACHIEVEMENTS.forEach(a => {
    if (!s.achievements.includes(a.id) && a.check(s)) { s.achievements.push(a.id); newly.push(a); }
  });
  return newly;
}

// ---------------- cloud sync (GitHub Gist) ----------------
async function findExistingGist(token) {
  try {
    const res = await fetch("https://api.github.com/gists", { headers: { Authorization: `token ${token}`, Accept: "application/vnd.github+json" } });
    if (!res.ok) return null;
    const list = await res.json();
    const found = list.find(g => g.files && g.files[GIST_FILENAME]);
    return found ? found.id : null;
  } catch (e) { return null; }
}
async function pullFromGist(token) {
  let gistId = localStorage.getItem(GISTID_KEY);
  if (!gistId) { gistId = await findExistingGist(token); if (gistId) localStorage.setItem(GISTID_KEY, gistId); }
  if (!gistId) return null;
  try {
    const res = await fetch(`https://api.github.com/gists/${gistId}`, { headers: { Authorization: `token ${token}`, Accept: "application/vnd.github+json" } });
    if (!res.ok) return null;
    const data = await res.json();
    const file = data.files && data.files[GIST_FILENAME];
    if (!file || !file.content) return null;
    return JSON.parse(file.content);
  } catch (e) { return null; }
}
async function pushToGist(token, stateObj) {
  let gistId = localStorage.getItem(GISTID_KEY);
  if (!gistId) gistId = await findExistingGist(token);
  const body = { description: "The Ledger — save data", public: false, files: { [GIST_FILENAME]: { content: JSON.stringify(stateObj) } } };
  try {
    if (gistId) {
      const res = await fetch(`https://api.github.com/gists/${gistId}`, { method: "PATCH", headers: { Authorization: `token ${token}`, Accept: "application/vnd.github+json" }, body: JSON.stringify(body) });
      return res.ok;
    } else {
      const res = await fetch("https://api.github.com/gists", { method: "POST", headers: { Authorization: `token ${token}`, Accept: "application/vnd.github+json" }, body: JSON.stringify(body) });
      if (res.ok) { const data = await res.json(); localStorage.setItem(GISTID_KEY, data.id); return true; }
      return false;
    }
  } catch (e) { return false; }
}

function TheLedger() {
  const [state, setState] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [toastMsg, setToastMsg] = useState(null);
  const [tab, setTab] = useState("board");
  const [spinning, setSpinning] = useState(false);
  const [spinLabel, setSpinLabel] = useState("tap to spin");
  const [newQuest, setNewQuest] = useState({ cat: "body", text: "", xp: 15, ignition: "" });
  const [newSide, setNewSide] = useState({ text: "", xp: 30, cat: "craft", timed: false });
  const [hoursInputs, setHoursInputs] = useState({});
  const [newReward, setNewReward] = useState({ text: "", cost: 30 });
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [moreOpen, setMoreOpen] = useState(false);
  const [moreTab, setMoreTab] = useState("log");
  const [tokenInput, setTokenInput] = useState("");
  const [syncStatus, setSyncStatus] = useState(() => (typeof localStorage !== "undefined" && localStorage.getItem(TOKEN_KEY)) ? "idle" : "off");
  const spinIv = useRef(null);
  const syncTimer = useRef(null);
  const fileInputRef = useRef(null);

  const persist = useCallback((s) => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch (e) { console.error(e); }
  }, []);

  useEffect(() => {
    (async () => {
      let s = defaultState();
      let cloudLoaded = false;
      const token = localStorage.getItem(TOKEN_KEY);
      if (token) {
        const cloud = await pullFromGist(token);
        if (cloud) { s = { ...defaultState(), ...cloud }; cloudLoaded = true; }
      }
      if (!cloudLoaded) {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) s = { ...defaultState(), ...JSON.parse(raw) };
        } catch (e) { /* first run */ }
      }
      if (!s.run) s.run = defaultState().run;
      s.loadout = { ...defaultState().loadout, ...s.loadout };
      if (!s.lifetime) s.lifetime = defaultState().lifetime;
      if (s.lifetime.enemiesDefeated === undefined) s.lifetime.enemiesDefeated = 0;
      if (!s.health) s.health = defaultState().health;
      if (!s.shop) s.shop = defaultState().shop;
      if (!s.dailyBonus) s.dailyBonus = defaultState().dailyBonus;
      if (s.pendingEnemy === undefined) s.pendingEnemy = null;
      delete s.armor; delete s.seenThemes;

      // migrate off retired stat categories (Bond/Path removed)
      s.stats = Object.fromEntries(Object.keys(STATS).map(k => [k, s.stats[k] || { xp: 0 }]));
      s.pool = s.pool.filter(q => STATS[q.cat]);
      s.dailyQuests = s.dailyQuests.filter(q => STATS[q.cat]);
      s.sideQuests = s.sideQuests.filter(q => STATS[q.cat]);
      s.bonusPool = s.bonusPool.filter(q => STATS[q.cat]);
      if (s.wheel.challenge && !STATS[s.wheel.challenge.cat]) s.wheel = { date: null, challenge: null, done: false };

      // weekly run/theme resolution (must happen before daily reset, since shop/enemies are theme-flavored)
      const wk = mondayKey(new Date());
      if (!s.run.weekKey) {
        const theme = pickTheme(null);
        const dow = new Date().getDay();
        const dowCalc = dow === 0 ? 7 : dow;
        const remaining = dowCalc <= 6 ? Math.max(7 - dowCalc, 1) : 1;
        const scaled = remaining < 6;
        const hp = Math.max(120, Math.round(BASE_BOSS_HP * remaining / 6));
        s.run = { weekKey: wk, theme: theme.key, questsDone: 0, transition: null, scaledStart: scaled };
        s.boss = { name: theme.bossNames[0], hp, maxHp: hp, floor: 1 };
      } else if (s.run.weekKey !== wk && !s.run.transition) {
        const oldTheme = THEMES.find(t => t.key === s.run.theme) || THEMES[0];
        const result = s.boss.hp <= 0 ? "victory" : "escaped";
        s.run.transition = { oldThemeName: oldTheme.name, oldThemeKey: oldTheme.key, result, questsDone: s.run.questsDone, ownedLoadout: [...s.ownedLoadout] };
      }
      s.health.current = Math.min(s.health.current, computeMaxHealth(s));

      if (s.lastOpen !== todayStr()) {
        const missed = s.lastOpen && s.dailyQuests.some(q => q.stage !== "done");
        if (missed && !hasNoCurse(s)) {
          s.staticMeter = Math.min(s.staticMeter + 1, 3);
          s.health.current = Math.max(0, s.health.current - 15);
        } else if (!missed) {
          s.staticMeter = Math.max(s.staticMeter - 1, 0);
        }
        s.streak = missed ? 0 : s.streak;
        s.sigil = SIGILS[Math.floor(Math.random() * SIGILS.length)];
        s.dailyQuests = drawDailyQuests(s.pool, s.stats);
        s.wheel = { date: todayStr(), challenge: null, done: false };
        s.lastOpen = todayStr();
        s.dailyBonus = { date: todayStr(), claimed: false };

        const liveTheme = THEMES.find(t => t.key === s.run.theme) || THEMES[0];
        const pool = allPoolItems(s);
        s.shop = { date: todayStr(), stock: pool.sort(() => Math.random() - 0.5).slice(0, 4).map(i => i.id), rerollsUsed: 0 };
        if (!s.pendingEnemy) s.pendingEnemy = rollEnemy(liveTheme, charLevelOf(s));
      }

      if (s.health.current <= 0 && !s.run.transition) {
        const liveTheme = THEMES.find(t => t.key === s.run.theme) || THEMES[0];
        s.run.transition = { oldThemeName: liveTheme.name, oldThemeKey: liveTheme.key, result: "defeated", questsDone: s.run.questsDone, ownedLoadout: [...s.ownedLoadout] };
      }

      setState(s);
      setLoaded(true);
    })();
  }, []);

  useEffect(() => {
    if (!loaded || !state) return;
    persist(state);
    const token = localStorage.getItem(TOKEN_KEY);
    if (token) {
      setSyncStatus("saving");
      clearTimeout(syncTimer.current);
      syncTimer.current = setTimeout(async () => {
        const ok = await pushToGist(token, state);
        setSyncStatus(ok ? "synced" : "error");
      }, 2000);
    }
  }, [state, loaded, persist]);

  useEffect(() => {
    if (!loaded || !state || !state.run || !state.run.theme) return;
    const liveTheme = THEMES.find(t => t.key === state.run.theme) || THEMES[0];
    document.title = `The Ledger — ${liveTheme.name}`;
    const link = document.querySelector('link[rel="icon"]');
    if (link) link.href = `data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>${encodeURIComponent(liveTheme.emoji)}</text></svg>`;
  }, [loaded, state && state.run && state.run.theme]);

  const showToast = (msg, color) => { setToastMsg({ msg, color }); setTimeout(() => setToastMsg(null), 2800); };

  const igniteQuest = (u) => {
    setState(prev => {
      const s = structuredClone(prev);
      const q = s.dailyQuests.find(x => x.uid === u);
      if (!q || q.stage !== "new") return prev;
      q.stage = "ignited";
      s.shards += 2;
      showToast("Started. +2 shards for showing up.", "#9B9077");
      return s;
    });
  };

  const completeQuest = (u, stretch = false) => {
    setState(prev => {
      const s = structuredClone(prev);
      const q = s.dailyQuests.find(x => x.uid === u);
      if (!q || (q.stage === "done" && (!stretch || q.pushed))) return prev;
      q.stage = "done";
      if (stretch) q.pushed = true;
      const sigilMult = (s.sigil.stat === q.cat) ? s.sigil.mult : 1;
      const gearMult = computeXpMult(s, q.cat);
      let xpGain = Math.round(q.xp * sigilMult * gearMult);
      if (stretch) xpGain = Math.round(xpGain * 1.4);
      s.stats[q.cat].xp += xpGain;
      const boosted = (s.sigil.stat === "loot") || stretch || hasLootBoost(s);
      const loot = rollRarity(boosted);
      let shardGain = Math.round(loot.shards * computeShardMult(s));
      const doneSoFar = s.dailyQuests.filter(x => x.stage === "done").length;
      if (doneSoFar > 1) shardGain += momentumBonus(s);
      s.shards += shardGain;

      if (q.cat === "body") s.health.current = Math.min(computeMaxHealth(s), s.health.current + 3);

      const attack = computeAttack(s);
      let bossDmg = Math.round((xpGain * 0.4 + attack * 1.5) * bossDmgMult(s));
      if (stretch) bossDmg = Math.round(bossDmg * stretchBossMult(s));
      if (Math.random() < doubleBossChance(s)) bossDmg *= 2;
      s.boss.hp = Math.max(0, s.boss.hp - bossDmg);

      s.lootLog.unshift({ id: uid(), text: q.text + (stretch ? " (pushed further)" : ""), rarity: loot.rarity, color: loot.color, shards: shardGain, xp: xpGain, at: Date.now() });

      if (Math.random() < 0.04) {
        const notOwned = LOADOUT_ITEMS.filter(i => !s.ownedLoadout.includes(i.id));
        if (notOwned.length) {
          const drop = notOwned[Math.floor(Math.random() * notOwned.length)];
          s.ownedLoadout.push(drop.id);
          s.lootLog.unshift({ id: uid(), text: `Rare find: ${drop.name}!`, rarity: "epic", color: "#C1548F", shards: 0, xp: 0, at: Date.now() });
        }
      }
      s.lootLog = s.lootLog.slice(0, 30);
      if (s.dailyQuests.every(x => x.stage === "done")) s.streak += 1;
      s.run.questsDone = (s.run.questsDone || 0) + 1;
      s.lifetime.questsDone = (s.lifetime.questsDone || 0) + 1;

      const theme = THEMES.find(t => t.key === s.run.theme) || THEMES[0];
      if (s.boss.hp <= 0) {
        const clearedFloor = s.boss.floor;
        const bonus = 20 + clearedFloor * 5;
        s.shards += bonus;
        s.lifetime.bossesDefeated = (s.lifetime.bossesDefeated || 0) + 1;
        s.lootLog.unshift({ id: uid(), text: `${s.boss.name} falls! (${clearedFloor > 1 ? "elite " : ""}encounter cleared)`, rarity: "epic", color: "#C1548F", shards: bonus, xp: 0, at: Date.now() });
        s.boss = nextBoss(s.boss.maxHp, clearedFloor + 1, theme.bossNames);
        showToast(`${clearedFloor > 1 ? "Elite cleared" : "Boss cleared"}! +${bonus} bonus shards`, theme.accent);
      } else {
        showToast(`+${xpGain} XP · ${shardGain} shards (${loot.rarity})`, loot.color);
      }

      if (!stretch && !s.pendingFork && !s.pendingEnemy && Math.random() < FORK_CHANCE * forkChanceMult(s)) {
        s.pendingFork = { id: uid(), prompt: FORK_PROMPTS[Math.floor(Math.random() * FORK_PROMPTS.length)], safeAmt: 6, riskWin: 18 };
      } else if (!stretch && !s.pendingFork && !s.pendingEnemy && Math.random() < 0.12) {
        s.pendingEnemy = rollEnemy(theme, charLevelOf(s));
      }
      const newly = checkAchievements(s);
      if (newly.length) setTimeout(() => showToast(`🏆 Trophy: ${newly[0].name}`, "#CB9A3E"), 400);
      return s;
    });
  };

  const fightEnemy = () => {
    setState(prev => {
      if (!prev.pendingEnemy) return prev;
      const s = structuredClone(prev);
      const enemy = s.pendingEnemy;
      s.pendingEnemy = null;
      const attack = computeAttack(s);
      const winChance = clamp(0.5 + (attack - enemy.power) / 30, 0.15, 0.92);
      if (Math.random() < winChance) {
        s.shards += enemy.reward;
        s.lifetime.enemiesDefeated = (s.lifetime.enemiesDefeated || 0) + 1;
        if (Math.random() < 0.12) s.health.current = Math.max(0, s.health.current - (2 + Math.floor(Math.random() * 4)));
        s.lootLog.unshift({ id: uid(), text: `Defeated ${enemy.name}!`, rarity: "uncommon", color: "#4C8A57", shards: enemy.reward, xp: 0, at: Date.now() });
        showToast(`${enemy.name} defeated! +${enemy.reward} shards`, "#4C8A57");
        const newly = checkAchievements(s);
        if (newly.length) setTimeout(() => showToast(`🏆 Trophy: ${newly[0].name}`, "#CB9A3E"), 400);
      } else {
        const dmg = 10 + Math.floor(Math.random() * 8);
        s.health.current = Math.max(0, s.health.current - dmg);
        s.lootLog.unshift({ id: uid(), text: `Lost to ${enemy.name} — took ${dmg} damage`, rarity: "common", color: "#8e2b2b", shards: 0, xp: 0, at: Date.now() });
        showToast(`${enemy.name} got the better of you. -${dmg} HP`, "#8e2b2b");
      }
      if (s.health.current <= 0 && !s.run.transition) {
        const theme = THEMES.find(t => t.key === s.run.theme) || THEMES[0];
        s.run.transition = { oldThemeName: theme.name, oldThemeKey: theme.key, result: "defeated", questsDone: s.run.questsDone, ownedLoadout: [...s.ownedLoadout] };
      }
      return s;
    });
  };

  const fleeEnemy = () => setState(prev => ({ ...prev, pendingEnemy: null }));

  const resolveFork = (choice) => {
    setState(prev => {
      if (!prev.pendingFork) return prev;
      const s = structuredClone(prev);
      const f = s.pendingFork;
      s.pendingFork = null;
      if (choice === "safe") {
        s.shards += f.safeAmt;
        s.lootLog.unshift({ id: uid(), text: "Played it safe", rarity: "common", color: "#9B9077", shards: f.safeAmt, xp: 0, at: Date.now() });
        showToast(`Safe choice: +${f.safeAmt} shards`, "#9B9077");
      } else {
        const win = Math.random() < 0.5;
        if (win) {
          s.shards += f.riskWin;
          s.lootLog.unshift({ id: uid(), text: "Pushed your luck — it paid off!", rarity: "rare", color: "#3E7FAE", shards: f.riskWin, xp: 0, at: Date.now() });
          showToast(`Luck favors you! +${f.riskWin} shards`, "#3E7FAE");
        } else {
          showToast("The gamble fizzles. No bonus this time.", "#8e2b2b");
        }
      }
      return s;
    });
  };

  const spinWheel = () => {
    if (spinning || state.wheel.challenge) return;
    setSpinning(true);
    let ticks = 0;
    spinIv.current = setInterval(() => {
      setSpinLabel(CHALLENGE_POOL[Math.floor(Math.random() * CHALLENGE_POOL.length)].text);
      ticks++;
      if (ticks > 14) {
        clearInterval(spinIv.current);
        const pick = CHALLENGE_POOL[Math.floor(Math.random() * CHALLENGE_POOL.length)];
        setSpinning(false);
        setState(prev => ({ ...prev, wheel: { date: todayStr(), challenge: pick, done: false } }));
      }
    }, 90);
  };

  const completeChallenge = () => {
    setState(prev => {
      const s = structuredClone(prev);
      const c = s.wheel.challenge;
      if (!c || s.wheel.done) return prev;
      s.wheel.done = true;
      const xpGain = Math.round(c.xp * (s.sigil.stat === c.cat ? s.sigil.mult : 1) * computeXpMult(s, c.cat));
      s.stats[c.cat].xp += xpGain;
      const loot = rollRarity(true);
      const shardGain = Math.round(loot.shards * computeShardMult(s));
      s.shards += shardGain;
      s.lootLog.unshift({ id: uid(), text: "Wheel: " + c.text, rarity: loot.rarity, color: loot.color, shards: shardGain, xp: xpGain, at: Date.now() });
      s.run.questsDone = (s.run.questsDone || 0) + 1;
      s.lifetime.questsDone = (s.lifetime.questsDone || 0) + 1;
      checkAchievements(s);
      showToast(`Challenge cleared! +${xpGain} XP · ${shardGain} shards`, loot.color);
      return s;
    });
  };

  const completeBonus = (bId) => {
    setState(prev => {
      const s = structuredClone(prev);
      const b = s.bonusPool.find(x => x.id === bId);
      if (!b) return prev;
      const xpGain = Math.round(b.xp * computeXpMult(s, b.cat));
      s.stats[b.cat].xp += xpGain;
      const loot = rollRarity(hasLootBoost(s));
      const shardGain = Math.round(loot.shards * computeShardMult(s));
      s.shards += shardGain;
      s.lootLog.unshift({ id: uid(), text: "Bonus: " + b.text, rarity: loot.rarity, color: loot.color, shards: shardGain, xp: xpGain, at: Date.now() });
      s.run.questsDone = (s.run.questsDone || 0) + 1;
      s.lifetime.questsDone = (s.lifetime.questsDone || 0) + 1;
      checkAchievements(s);
      showToast(`+${xpGain} XP · ${shardGain} shards`, loot.color);
      return s;
    });
  };

  const addPoolQuest = () => {
    if (!newQuest.text.trim()) return;
    setState(prev => ({ ...prev, pool: [...prev.pool, { id: uid(), cat: newQuest.cat, text: newQuest.text, xp: newQuest.xp, ignition: newQuest.ignition || "Just start" }] }));
    setNewQuest({ cat: "body", text: "", xp: 15, ignition: "" });
    showToast("Added to quest pool", "#4C8A57");

  const addSideQuest = () => {

    setState(prev => ({ ...prev, sideQuests: [...prev.sideQuests, { id: uid(), uid: uid(), cat: newSide.cat, text: newSide.text, xp: newSide.timed ? null : newSide.xp, timed: newSide.timed, stage: "new" }] }));
    setNewSide({ text: "", xp: 30, cat: "craft", timed: false });
  };

  const completeSide = (u) => {
    setState(prev => {
      const s = structuredClone(prev);
      const q = s.sideQuests.find(x => x.uid === u);
      if (!q || q.stage === "done") return prev;
      q.stage = "done";
      const xpGain = Math.round(q.xp * computeXpMult(s, q.cat));
      s.stats[q.cat].xp += xpGain;
      const loot = rollRarity(hasLootBoost(s));
      const shardGain = Math.round(loot.shards * computeShardMult(s));
      s.shards += shardGain;
      s.lootLog.unshift({ id: uid(), text: q.text, rarity: loot.rarity, color: loot.color, shards: shardGain, xp: xpGain, at: Date.now() });
      s.run.questsDone = (s.run.questsDone || 0) + 1;
      s.lifetime.questsDone = (s.lifetime.questsDone || 0) + 1;
      checkAchievements(s);
      showToast(`+${xpGain} XP · ${shardGain} shards`, loot.color);
      return s;
    });
  };

  const completeTimedSide = (u, hours) => {
    setState(prev => {
      const s = structuredClone(prev);
      const q = s.sideQuests.find(x => x.uid === u);
      if (!q || q.stage === "done") return prev;
      const h = Math.max(0.25, Math.min(40, hours || 0));
      q.stage = "done";
      q.hoursLogged = h;
      const xpGain = Math.round(h * TIMED_XP_PER_HOUR * computeXpMult(s, q.cat));
      q.xpGained = xpGain;
      s.stats[q.cat].xp += xpGain;

      const numRolls = 1 + Math.floor(h / 2);
      const rolls = Array.from({ length: numRolls }, () => rollRarity(hasLootBoost(s)));
      let best = rolls[0];
      rolls.forEach(r => { if (RARITY.findIndex(x => x.key === r.rarity) > RARITY.findIndex(x => x.key === best.rarity)) best = r; });
      let shardGain = Math.round(h * TIMED_SHARD_PER_HOUR * computeShardMult(s));
      rolls.forEach(r => { shardGain += r.shards; });
      s.shards += shardGain;

      const attack = computeAttack(s);
      let bossDmg = Math.round((xpGain * 0.4 + attack * 1.5) * bossDmgMult(s));
      if (Math.random() < doubleBossChance(s)) bossDmg *= 2;
      s.boss.hp = Math.max(0, s.boss.hp - bossDmg);
      if (q.cat === "body") s.health.current = Math.min(computeMaxHealth(s), s.health.current + 3);
      const theme = THEMES.find(t => t.key === s.run.theme) || THEMES[0];
      if (s.boss.hp <= 0) {
        const clearedFloor = s.boss.floor;
        const bonus = 20 + clearedFloor * 5;
        s.shards += bonus;
        s.lifetime.bossesDefeated = (s.lifetime.bossesDefeated || 0) + 1;
        s.lootLog.unshift({ id: uid(), text: `${s.boss.name} falls! (${clearedFloor > 1 ? "elite " : ""}encounter cleared)`, rarity: "epic", color: "#C1548F", shards: bonus, xp: 0, at: Date.now() });
        s.boss = nextBoss(s.boss.maxHp, clearedFloor + 1, theme.bossNames);
      }

      s.lootLog.unshift({ id: uid(), text: `${q.text} (${h}h logged)`, rarity: best.rarity, color: best.color, shards: shardGain, xp: xpGain, at: Date.now() });
      s.lootLog = s.lootLog.slice(0, 30);
      s.run.questsDone = (s.run.questsDone || 0) + 1;
      s.lifetime.questsDone = (s.lifetime.questsDone || 0) + 1;
      const newly = checkAchievements(s);
      showToast(`Logged ${h}h — +${xpGain} XP · ${shardGain} shards (${best.rarity})`, best.color);
      if (newly.length) setTimeout(() => showToast(`🏆 Trophy: ${newly[0].name}`, "#CB9A3E"), 900);
      return s;
    });
  };

  const removeSide = (u) => setState(prev => ({ ...prev, sideQuests: prev.sideQuests.filter(q => q.uid !== u) }));
  const addReward = () => {
    if (!newReward.text.trim()) return;
    setState(prev => ({ ...prev, vault: [...prev.vault, { id: uid(), ...newReward }] }));
    setNewReward({ text: "", cost: 30 });
  };
  const removeReward = (id) => setState(prev => ({ ...prev, vault: prev.vault.filter(r => r.id !== id) }));
  const redeem = (r) => {
    setState(prev => {
      const cost = Math.round(r.cost * vaultDiscountMult(prev));
      if (prev.shards < cost) { showToast("Not enough shards", "#8e2b2b"); return prev; }
      showToast(`Redeemed: ${r.text}`, "#4C8A57");
      return { ...prev, shards: prev.shards - cost };
    });
  };

  const buyLoadoutItem = (id) => {
    setState(prev => {
      const def = findPoolItem(id, prev);
      if (!def || prev.ownedLoadout.includes(id)) return prev;
      if (prev.shards < def.cost) { showToast("Not enough shards", "#8e2b2b"); return prev; }
      const s = structuredClone(prev);
      s.shards -= def.cost;
      s.ownedLoadout.push(id);
      if (def.slot === "accessory") {
        if (!s.loadout.acc1) s.loadout.acc1 = id;
        else if (!s.loadout.acc2) s.loadout.acc2 = id;
      } else if (!s.loadout[def.slot]) {
        s.loadout[def.slot] = id;
      }
      showToast(`Acquired: ${themedName(def, theme)}`, "#CB9A3E");
      return s;
    });
  };
  const equipItem = (id) => {
    setState(prev => {
      const def = findPoolItem(id, prev);
      if (!def) return prev;
      const s = structuredClone(prev);
      if (def.slot === "accessory") {
        if (s.loadout.acc1 === id || s.loadout.acc2 === id) return prev;
        if (!s.loadout.acc1) s.loadout.acc1 = id;
        else if (!s.loadout.acc2) s.loadout.acc2 = id;
        else s.loadout.acc2 = id;
      } else {
        s.loadout[def.slot] = id;
      }
      return s;
    });
  };
  const unequipSlot = (slot) => setState(prev => ({ ...prev, loadout: { ...prev.loadout, [slot]: null } }));

  const confirmTransition = (keepsakeId) => {
    setState(prev => {
      if (!prev.run.transition) return prev;
      const def = keepsakeId ? findPoolItem(keepsakeId, prev) : null;
      const s = structuredClone(prev);
      if (s.run.transition.result === "victory") {
        const key = s.run.transition.oldThemeKey;
        if (key && !s.clearedThemes.includes(key)) s.clearedThemes.push(key);
        if (key && !s.unlockedSkins.includes(key)) s.unlockedSkins.push(key);
      }
      const nextTheme = pickTheme(s.run.theme);
      s.boss = { name: nextTheme.bossNames[0], hp: BASE_BOSS_HP, maxHp: BASE_BOSS_HP, floor: 1 };
      s.run = { weekKey: mondayKey(new Date()), theme: nextTheme.key, questsDone: 0, transition: null, scaledStart: false };
      s.ownedLoadout = def ? [def.id] : [];
      s.loadout = { weapon: null, helmet: null, chest: null, legs: null, acc1: null, acc2: null };
      if (def) {
        if (def.slot === "accessory") s.loadout.acc1 = def.id;
        else s.loadout[def.slot] = def.id;
      }
      s.health = { current: computeMaxHealth(s) };
      s.pendingFork = null;
      s.pendingEnemy = null;
      checkAchievements(s);
      showToast(`A new tale begins: ${nextTheme.name}`, nextTheme.accent);
      return s;
    });
  };

  const claimDailyBonus = () => {
    setState(prev => {
      if (prev.dailyBonus.claimed && prev.dailyBonus.date === todayStr()) return prev;
      const amount = 6 + Math.floor(Math.random() * 6);
      showToast(`Daily bonus claimed: +${amount} shards`, "#CB9A3E");
      return { ...prev, shards: prev.shards + amount, dailyBonus: { date: todayStr(), claimed: true } };
    });
  };

  const rerollShop = () => {
    setState(prev => {
      const cost = 8 * (prev.shop.rerollsUsed + 1);
      if (prev.shards < cost) { showToast("Not enough shards to reroll", "#8e2b2b"); return prev; }
      const pool = allPoolItems(prev);
      const stock = pool.sort(() => Math.random() - 0.5).slice(0, 4).map(i => i.id);
      showToast("Shop restocked", "#CB9A3E");
      return { ...prev, shards: prev.shards - cost, shop: { date: todayStr(), stock, rerollsUsed: prev.shop.rerollsUsed + 1 } };
    });
  };

  const exportSave = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `ledger-save-${todayStr().replace(/\s+/g, "-")}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast("Save downloaded", "#4C8A57");
  };

  const handleImportFile = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!window.confirm("Load this save? It will overwrite your current progress on this device.")) return;
        setState({ ...defaultState(), ...parsed });
        showToast("Save loaded", "#4C8A57");
      } catch (err) { showToast("Invalid save file", "#8e2b2b"); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const connectSync = async () => {
    if (!tokenInput.trim()) return;
    const t = tokenInput.trim();
    localStorage.setItem(TOKEN_KEY, t);
    setSyncStatus("saving");
    const cloud = await pullFromGist(t);
    let ok;
    if (cloud) { setState(prev => ({ ...defaultState(), ...cloud })); ok = true; }
    else { ok = await pushToGist(t, state); }
    setSyncStatus(ok ? "synced" : "error");
    setTokenInput("");
    showToast(ok ? "Cloud sync connected" : "Couldn't reach GitHub — check the token", ok ? "#4C8A57" : "#8e2b2b");
  };
  const disconnectSync = () => {
    localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(GISTID_KEY); setSyncStatus("off");
    showToast("Cloud sync disconnected (this device only now)", "#9B9077");
  };

  if (!loaded || !state) {
    return <div style={{ background: "#170f09", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: "#CB9A3E", fontFamily: "'MedievalSharp', serif", fontSize: "16px" }}>unrolling the ledger…</div>;
  }

  const charLevel = Math.floor(Object.values(state.stats).reduce((a, s) => a + xpToLevel(s.xp), 0) / Object.keys(STATS).length);
  const liveTheme = THEMES.find(t => t.key === state.run.theme) || THEMES[0];
  const theme = state.activeSkin ? (THEMES.find(t => t.key === state.activeSkin) || liveTheme) : liveTheme;
  const parchment = cardMaterial(theme);
  const plaque = plaqueMaterial(theme);
  const dow = new Date().getDay();
  const dayLabel = DAY_LABELS[dow];
  const daysUntilBoss = dow === 0 ? 6 : Math.max(0, 6 - dow);
  const maxHealth = computeMaxHealth(state);
  const healthPct = maxHealth ? state.health.current / maxHealth : 1;
  const attackStat = computeAttack(state);
  const defenseStat = computeDefense(state);

  return (
    <div style={{ minHeight: "100vh", background: `radial-gradient(ellipse at top, ${theme.accent}26 0%, transparent 45%), radial-gradient(ellipse at top, ${theme.pageBg[0]} 0%, ${theme.pageBg[1]} 55%, ${theme.pageBg[2]} 100%)`, color: "#f1e2bd", fontFamily: "'Nunito', system-ui, sans-serif", paddingBottom: "80px", transition: "background 0.4s ease" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=JetBrains+Mono:wght@400;500;700&family=MedievalSharp&family=Monoton&family=Nunito:wght@400;600;700;800&family=Orbitron:wght@400;600;700&family=Pirata+One&family=Rye&display=swap');
        * { box-sizing: border-box; }
        .disp { font-family: '${theme.font}', 'MedievalSharp', serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .btn { cursor: pointer; transition: all .12s ease; }
        .btn:hover { filter: brightness(1.1); }
        .btn:active { transform: translateY(2px); box-shadow: none !important; }
        .lift:hover { transform: translateY(-2px); }

                      {q.timed
                        ? (q.stage === "done" ? `${q.hoursLogged}h logged · +${q.xpGained || 0} xp` : `${def.label} · tracked by hours`)
                        : `${def.label} · ${q.xp} xp`}
                    </div>
                  </div>
                  {q.stage !== "done" ? (
                    q.timed ? (
                      <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                        <input type="number" min="0.25" step="0.25" value={hoursInputs[q.uid] ?? "1"} onChange={e => setHoursInputs(prev => ({ ...prev, [q.uid]: e.target.value }))} style={{ width: "52px" }} />
                        <div className="btn btn3d" onClick={() => completeTimedSide(q.uid, parseFloat(hoursInputs[q.uid] ?? "1") || 1)} style={{ ...btnPrimary, padding: "6px 8px", fontSize: "10px" }}>Log &amp; complete</div>
                      </div>
                    ) : (
                      <div className="btn btn3d" onClick={() => completeSide(q.uid)} style={{ ...btnPrimary, padding: "6px 10px" }}><Icon name="check" size={13} color="#f5ecd2" /></div>
                    )
                  ) : (
                    <div className="btn" onClick={() => removeSide(q.uid)}><Icon name="x" size={14} color="#7a6440" /></div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {tab === "gear" && (
          <div style={{ display: "flex", flexDirection: "column", gap: "16px" }}>
            <div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "8px" }}>
                <div className="mono" style={{ fontSize: "11px", letterSpacing: "1px", color: "#b9ac8c" }}>TODAY'S SHOP</div>
                <div className="btn" onClick={rerollShop} style={{ ...btnGhost, padding: "4px 8px", fontSize: "10px" }}>Reroll ({8 * (state.shop.rerollsUsed + 1)} <Icon name="gem" size={9} color="#5a4326" style={{ verticalAlign: "-1px" }} />)</div>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: "8px", marginBottom: "16px" }}>
                {state.shop.stock.map(id => {
                  const item = findPoolItem(id, state);
                  if (!item) return null;
                  const owned = state.ownedLoadout.includes(item.id);
                  const affordable = state.shards >= item.cost;
                  return (
                    <div key={item.id} className="lift" style={{ padding: "10px", display: "flex", alignItems: "center", gap: "10px", ...parchment, opacity: owned ? 0.6 : 1 }}>
                      <div style={itemSlot(theme.accent)}><Sprite name={item.sprite} tint={theme.accent} size={2} /></div>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: "12px", fontWeight: 700 }}>{themedName(item, theme)} <span className="mono" style={{ fontSize: "9px", color: "#7a6440" }}>({item.slot})</span></div>
                        <div className="mono" style={{ fontSize: "10px", color: "#7a6440" }}>{item.desc}</div>
                      </div>
                      {owned ? <span className="mono" style={{ fontSize: "10px", color: "#4C8A57", fontWeight: 700 }}>Owned</span> : (
                        <div className="btn btn3d" onClick={() => buyLoadoutItem(item.id)} style={{ ...(affordable ? btnPrimary : btnGhost), padding: "5px 9px", fontSize: "10px" }}>{item.cost} <Icon name="gem" size={10} color={affordable ? "#f5ecd2" : "#7a6440"} style={{ verticalAlign: "-1px" }} /></div>
                      )}
                    </div>
                  );
                })}
              </div>

              <div className="mono" style={{ fontSize: "11px", letterSpacing: "1px", color: "#b9ac8c", marginBottom: "8px" }}>LOADOUT — weekly, wiped except one keepsake</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "8px", marginBottom: "10px" }}>
                {["weapon", "helmet", "chest", "legs", "acc1", "acc2"].map(slot => {
                  const itemId = state.loadout[slot];
                  const def = itemId ? findPoolItem(itemId, state) : null;
                  const label = slot === "weapon" ? "WEAPON" : slot === "acc1" || slot === "acc2" ? "ACCESSORY" : slot.toUpperCase();
                  return (
                    <div key={slot} className="btn" onClick={() => def && unequipSlot(slot)} style={{ padding: "8px", ...parchment, textAlign: "center" }}>
                      <div className="mono" style={{ fontSize: "9px", color: "#7a6440" }}>{label}</div>
                      {def ? (
                        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: "4px", marginTop: "4px" }}>
                          <Sprite name={def.sprite} tint={theme.accent} size={2} />
                          <div style={{ fontSize: "9px", fontWeight: 700 }}>{themedName(def, theme)}</div>
                        </div>
                      ) : <div style={{ fontSize: "10px", color: "#a89264", marginTop: "8px" }}>empty</div>}
                    </div>
                  );
                })}
              </div>
              {state.ownedLoadout.length > 0 && (
                <div style={{ marginBottom: "10px" }}>
                  <div className="mono" style={{ fontSize: "10px", color: "#b9ac8c", marginBottom: "6px" }}>OWNED — tap to equip</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: "6px" }}>
                    {state.ownedLoadout.map(id => {
                      const def = findPoolItem(id, state);
                      if (!def) return null;
                      const equipped = Object.values(state.loadout).includes(id);
                      return (
                        <div key={id} className="btn" onClick={() => equipItem(id)}
                          style={{ ...btnGhost, borderColor: equipped ? theme.accent : "#b3925a", color: equipped ? theme.accent : "#5a4326", padding: "5px 9px" }}>
                          {themedName(def, theme)}{equipped ? " ✓" : ""}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              <div className="mono" style={{ fontSize: "10px", color: "#b9ac8c", marginBottom: "6px" }}>FULL CATALOG</div>
              <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
                {allPoolItems(state).map(item => {
                  const owned = state.ownedLoadout.includes(item.id);
                  const affordable = state.shards >= item.cost;
                  return (
                    <div key={item.id} className="lift" style={{ padding: "10px", display: "flex", alignItems: "center", gap: "10px", ...parchment, opacity: owned ? 0.6 : 1 }}>
                      <div style={itemSlot(theme.accent)}><Sprite name={item.sprite} tint={theme.accent} size={2} /></div>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: "12px", fontWeight: 700 }}>{themedName(item, theme)} <span className="mono" style={{ fontSize: "9px", color: "#7a6440" }}>({item.slot})</span></div>
                        <div className="mono" style={{ fontSize: "10px", color: "#7a6440" }}>{item.desc}</div>
                      </div>
                      {owned ? <span className="mono" style={{ fontSize: "10px", color: "#4C8A57", fontWeight: 700 }}>Owned</span> : (
                        <div className="btn btn3d" onClick={() => buyLoadoutItem(item.id)} style={{ ...(affordable ? btnPrimary : btnGhost), padding: "5px 9px", fontSize: "10px" }}>{item.cost} <Icon name="gem" size={10} color={affordable ? "#f5ecd2" : "#7a6440"} style={{ verticalAlign: "-1px" }} /></div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {tab === "vault" && (
          <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
            <div style={{ padding: "10px", display: "flex", gap: "6px", ...parchment }}>
              <input placeholder="Reward you can redeem…" value={newReward.text} onChange={e => setNewReward({ ...newReward, text: e.target.value })} style={{ flex: 1 }} />
              <input type="number" value={newReward.cost} onChange={e => setNewReward({ ...newReward, cost: +e.target.value })} style={{ width: "60px" }} />
              <div className="btn btn3d" onClick={addReward} style={{ ...btnPrimary, padding: "6px 10px", display: "flex", alignItems: "center" }}><Icon name="plus" size={14} color="#f5ecd2" /></div>
            </div>
            {state.vault.map(r => {
              const effCost = Math.round(r.cost * vaultDiscountMult(state));
              return (
                <div key={r.id} className="lift" style={{ padding: "12px", display: "flex", alignItems: "center", gap: "10px", ...parchment }}>
                  <div style={badge("#CB9A3E")}><Icon name="chest" size={15} color="#CB9A3E" /></div>
                  <div style={{ flex: 1, fontSize: "13px", fontWeight: 600 }}>{r.text}</div>
                  <div className="mono" style={{ fontSize: "11px", color: "#7a6440" }}>{effCost}{effCost !== r.cost ? <span style={{ textDecoration: "line-through", opacity: 0.6, marginLeft: "4px" }}>{r.cost}</span> : null}</div>
                  <div className="btn btn3d" onClick={() => redeem(r)} style={{ ...(state.shards >= effCost ? btnPrimary : btnGhost), padding: "6px 10px", fontSize: "11px" }}>Redeem</div>
                  <Icon name="x" size={13} color="#a89264" style={{ cursor: "pointer" }} className="btn" onClick={() => removeReward(r.id)} />
                </div>
              );
            })}
          </div>
        )}

      </div>
      </div>
      </div>
      </div>

      {moreOpen && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(10,7,4,0.85)", zIndex: 40, display: "flex", alignItems: "flex-start", justifyContent: "center", padding: "20px", overflowY: "auto" }}>
          <div style={{ maxWidth: "520px", width: "100%", ...plaque, padding: "16px", animation: "popIn .18s ease" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "10px" }}>
              <div className="disp" style={{ fontSize: "18px", color: theme.accent }}>More</div>
              <div className="btn" onClick={() => setMoreOpen(false)}><Icon name="x" size={16} color="#b9ac8c" /></div>
            </div>
            <div style={{ display: "flex", gap: "2px", borderBottom: "3px double #6b4a26", marginBottom: "14px" }}>
              {[["log", "Loot Log", "sparkles"], ["trophies", "Trophies", "trophy"], ["pool", "Edit Pool", "scroll"]].map(([key, label, iconName]) => (
                <div key={key} onClick={() => setMoreTab(key)} className="btn" style={{ display: "flex", alignItems: "center", gap: "5px", padding: "8px 10px", fontSize: "12px", fontWeight: 700, color: moreTab === key ? theme.accent : "#8a7550", borderBottom: moreTab === key ? `3px solid ${theme.accent}` : "3px solid transparent" }}>
                  <Icon name={iconName} size={13} /> {label}
                </div>
              ))}
            </div>

            {moreTab === "log" && (
              <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
                {state.lootLog.length === 0 && <div style={{ color: "#d8c9a3", fontSize: "13px" }}>Nothing yet. Complete a quest.</div>}
                {state.lootLog.map(l => (
                  <div key={l.id} style={{ padding: "10px 12px", display: "flex", alignItems: "center", gap: "8px", ...parchment }}>
                    <div style={{ width: "9px", height: "9px", borderRadius: "50%", background: l.color, border: "1px solid rgba(0,0,0,0.2)" }} />
                    <div style={{ flex: 1, fontSize: "12px" }}>{l.text}</div>
                    <div className="mono" style={{ fontSize: "10px", color: "#7a6440" }}>+{l.xp}xp · {l.shards}sh · {l.rarity}</div>
                  </div>
                ))}
              </div>
            )}

            {moreTab === "trophies" && (
              <div style={{ display: "flex", flexDirection: "column", gap: "16px" }}>
                <div>
                  <div className="mono" style={{ fontSize: "11px", letterSpacing: "1px", color: "#b9ac8c", marginBottom: "8px" }}>COSMETIC SKINS — visual only, unlocked forever after clearing a themed run</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: "8px" }}>
                    <div className="btn" onClick={() => setState(prev => ({ ...prev, activeSkin: null }))} style={{ ...(state.activeSkin === null ? btnPrimary : btnGhost), padding: "6px 10px", fontSize: "11px" }}>Live rotation</div>
                    {state.unlockedSkins.map(key => {
                      const t = THEMES.find(x => x.key === key);
                      if (!t) return null;
                      const active = state.activeSkin === key;
                      return (
                        <div key={key} className="btn" onClick={() => setState(prev => ({ ...prev, activeSkin: key }))} style={{ ...(active ? btnPrimary : btnGhost), padding: "6px 10px", fontSize: "11px" }}>{t.emoji} {t.name}</div>
                      );
                    })}
                    {state.unlockedSkins.length === 0 && <div style={{ fontSize: "11px", color: "#d8c9a3" }}>Clear a themed run's boss to unlock its permanent look.</div>}
                  </div>
                </div>
                <div>
                  <div className="mono" style={{ fontSize: "11px", letterSpacing: "1px", color: "#b9ac8c", marginBottom: "8px" }}>TROPHY CASE — {state.achievements.length}/{ACHIEVEMENTS.length} earned</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: "6px" }}>
                    {ACHIEVEMENTS.map(a => {
                      const earned = state.achievements.includes(a.id);
                      return (
                        <div key={a.id} style={{ padding: "10px 12px", display: "flex", alignItems: "center", gap: "10px", ...parchment, opacity: earned ? 1 : 0.45 }}>
                          <Icon name="trophy" size={15} color={earned ? "#CB9A3E" : "#7a6440"} />
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: "12px", fontWeight: 700 }}>{a.name}</div>
                            <div className="mono" style={{ fontSize: "10px", color: "#7a6440" }}>{a.desc}</div>
                          </div>
                          {earned && <Icon name="check" size={14} color="#4C8A57" />}
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}

            {moreTab === "pool" && (
              <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
                <div style={{ padding: "10px", display: "flex", gap: "6px", flexWrap: "wrap", ...parchment }}>
                  <select value={newQuest.cat} onChange={e => setNewQuest({ ...newQuest, cat: e.target.value })}>
                    {Object.entries(STATS).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                  </select>
                  <input placeholder="Quest text…" value={newQuest.text} onChange={e => setNewQuest({ ...newQuest, text: e.target.value })} style={{ flex: 1, minWidth: "120px" }} />
                  <input type="number" value={newQuest.xp} onChange={e => setNewQuest({ ...newQuest, xp: +e.target.value })} style={{ width: "60px" }} />
                  <input placeholder="Ignition step (2-min starter)…" value={newQuest.ignition} onChange={e => setNewQuest({ ...newQuest, ignition: e.target.value })} style={{ flex: 1, minWidth: "160px" }} />
                  <div className="btn btn3d" onClick={addPoolQuest} style={{ ...btnPrimary, padding: "6px 10px", display: "flex", alignItems: "center" }}><Icon name="plus" size={14} color="#f5ecd2" /></div>
                </div>
                <div className="mono" style={{ fontSize: "11px", color: "#b9ac8c" }}>{state.pool.length} quests in the pool. Each day draws 3, weighted toward whichever stat has fallen behind.</div>
                {Object.entries(STATS).map(([key, def]) => (
                  <div key={key} style={{ marginTop: "4px" }}>
                    <div style={{ fontSize: "11px", color: def.color, marginBottom: "4px", fontWeight: 700 }} className="mono">{def.label.toUpperCase()}</div>
                    {state.pool.filter(q => q.cat === key).map(q => (
                      <div key={q.id} style={{ fontSize: "12px", color: "#e2d6b0", padding: "3px 0", display: "flex", justifyContent: "space-between" }}>
                        <span>{q.text}</span><span className="mono" style={{ color: "#8a7550" }}>{q.xp}xp</span>
                      </div>
                    ))}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      )}

      {toastMsg && (
        <div style={{ position: "fixed", bottom: "18px", left: "50%", transform: "translateX(-50%)", background: "linear-gradient(160deg, #f5e6bf, #ecd6a3)", border: `2px solid ${toastMsg.color}`, borderRadius: "8px", padding: "10px 16px", fontSize: "12px", color: "#3c2a16", fontWeight: 700, boxShadow: "0 6px 20px rgba(0,0,0,0.4)", animation: "popIn .18s ease" }} className="mono">
          {toastMsg.msg}
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<TheLedger />);
</script>
<script>
  (function () {
    const src = document.getElementById("ledger-src").textContent;
    const compiled = Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code;
    const s = document.createElement("script");
    s.textContent = compiled;
    document.body.appendChild(s);
  })();
</script>
</body>
</html>
